<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 | 마인드무빙 컨설팅</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --teal: #3B8A8C;
    --teal-dark: #2B7173;
    --teal-pale: #EBF4F4;
    --taupe: #8B7D6B;
    --taupe-pale: #F2EDE8;
    --black: #1A1A1A;
    --gray: #5A5A5A;
    --gray-light: #9A9A9A;
    --border: #E4E4E4;
    --white: #FFFFFF;
    --danger: #E53E3E;
    --success: #38A169;
    --bg: #F7F7F5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--black);
    min-height: 100vh;
  }

  /* LOGIN */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1A3A3A 0%, #2B5F61 100%);
  }
  .login-box {
    background: white;
    border-radius: 16px;
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.3);
  }
  .login-logo { margin-bottom: 1rem; }
  .login-logo img { height: 48px; }
  .login-brand-top {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--teal);
    text-transform: uppercase;
    display: block;
    margin-top: 0.5rem;
  }
  .login-brand-sub {
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: var(--taupe);
    text-transform: uppercase;
    display: block;
    margin-top: 3px;
  }
  .login-box h1 {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--black);
    margin: 1.25rem 0 0.3rem;
  }
  .login-box p { color: var(--gray-light); font-size: 0.85rem; margin-bottom: 2rem; }
  .login-box input {
    width: 100%;
    padding: 0.85rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    text-align: center;
    letter-spacing: 6px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 0.85rem;
    color: var(--black);
    font-family: inherit;
  }
  .login-box input:focus { border-color: var(--teal); }
  .login-box input::placeholder { letter-spacing: 0; color: #ccc; }
  .login-btn {
    width: 100%;
    padding: 0.88rem;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .login-btn:hover { background: var(--teal-dark); }
  .login-error { color: var(--danger); font-size: 0.82rem; margin-top: 0.75rem; display: none; }

  /* ADMIN SHELL */
  #adminPanel { display: none; min-height: 100vh; }

  .admin-header {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .admin-header-left { display: flex; align-items: center; gap: 0.75rem; }
  .admin-header-left img { height: 32px; }
  .admin-header-brand { line-height: 1.2; }
  .admin-header-brand strong {
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--teal);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
  }
  .admin-header-brand span { font-size: 0.65rem; color: var(--gray-light); letter-spacing: 1px; }
  .admin-header-right { display: flex; align-items: center; gap: 1.25rem; }
  .header-link {
    color: var(--gray-light);
    text-decoration: none;
    font-size: 0.83rem;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .header-link:hover { color: var(--teal); }
  .logout-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--gray);
    padding: 0.38rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.2s;
  }
  .logout-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    padding: 1.5rem 2rem;
    background: white;
    border-bottom: 1px solid var(--border);
  }
  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .stat-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .stat-icon.teal { background: var(--teal-pale); }
  .stat-icon.taupe { background: var(--taupe-pale); }
  .stat-icon.dark { background: #1A1A1A10; }
  .stat-info-num {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--black);
    line-height: 1;
    letter-spacing: -1px;
  }
  .stat-info-label { font-size: 0.72rem; color: var(--gray-light); margin-top: 0.2rem; font-weight: 500; }

  /* CONTENT EDITOR */
  .content-editor-wrap {
    background: white;
    border-bottom: 1px solid var(--border);
  }
  .ce-header {
    padding: 0.85rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .ce-header:hover { background: var(--bg); }
  .ce-header-left strong { font-size: 0.84rem; font-weight: 700; color: var(--black); display: block; }
  .ce-header-left span { font-size: 0.71rem; color: var(--gray-light); }
  .ce-arrow { transition: transform 0.2s; color: var(--gray-light); flex-shrink: 0; }
  .ce-arrow.open { transform: rotate(180deg); }
  .ce-body { padding: 1.25rem 2rem 1.5rem; border-top: 1px solid var(--border); display: none; }
  .ce-body.open { display: block; }
  .ce-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  .ce-section-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--taupe);
    padding-bottom: 0.45rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.75rem;
  }
  .ce-section-label + .ce-section-label,
  .ce-field + .ce-section-label { margin-top: 1.5rem; }
  .ce-field { margin-bottom: 0.65rem; }
  .ce-field label { display: block; font-size: 0.71rem; font-weight: 700; color: var(--black); margin-bottom: 0.22rem; }
  .ce-field input, .ce-field textarea {
    width: 100%;
    padding: 0.48rem 0.75rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 0.83rem;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
    background: white;
    color: var(--black);
    resize: vertical;
  }
  .ce-field input:focus, .ce-field textarea:focus { border-color: var(--teal); }
  .ce-footer {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
    align-items: center;
  }
  .ce-save-btn {
    padding: 0.6rem 1.75rem;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 7px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .ce-save-btn:hover { background: var(--teal-dark); }
  .ce-reset-btn {
    padding: 0.6rem 1.1rem;
    background: transparent;
    color: var(--gray-light);
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .ce-reset-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* BODY */
  .admin-body {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 1.5rem;
    padding: 1.5rem 2rem;
    max-width: 1300px;
    margin: 0 auto;
    align-items: start;
  }

  /* CARD */
  .card {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .card-header {
    padding: 1.1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-header h2 { font-size: 0.92rem; font-weight: 700; color: var(--black); }
  .card-body { padding: 1.5rem; }

  /* FORM */
  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--black);
    margin-bottom: 0.38rem;
  }
  .form-group label .req { color: var(--teal); margin-left: 2px; }
  .form-group label .opt { color: var(--gray-light); font-weight: 400; font-size: 0.72rem; margin-left: 4px; }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 0.65rem 0.85rem;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    color: var(--black);
    background: white;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--teal); }
  .form-group textarea { resize: vertical; min-height: 64px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .photo-upload-wrap { display: flex; align-items: center; gap: 0.75rem; }
  .photo-upload-btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; background: var(--teal); color: white; border-radius: 6px; font-size: 0.82rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .photo-upload-btn:hover { background: var(--teal-dark); }
  .photo-filename { font-size: 0.8rem; color: var(--gray-light); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .date-selects { display: grid; grid-template-columns: 2fr 1.5fr 1.5fr; gap: 0.5rem; }
  .date-sel { padding: 0.65rem 0.5rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; font-family: inherit; background: var(--bg); color: var(--text); cursor: pointer; }
  .date-sel:focus { outline: none; border-color: var(--teal); }

  .submit-btn {
    width: 100%;
    padding: 0.82rem;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    margin-top: 0.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
  }
  .submit-btn:hover { background: var(--teal-dark); transform: translateY(-1px); }
  .submit-btn.edit-mode { background: #D69E2E; }
  .submit-btn.edit-mode:hover { background: #B7791F; }
  .cancel-edit-btn {
    width: 100%;
    padding: 0.65rem;
    background: transparent;
    color: var(--gray-light);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    margin-top: 0.5rem;
    display: none;
  }
  .cancel-edit-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* LIST CONTROLS */
  .list-controls {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-input {
    flex: 1;
    min-width: 160px;
    padding: 0.55rem 0.85rem;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-size: 0.85rem;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--teal); }
  .filter-select {
    padding: 0.55rem 0.75rem;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-size: 0.82rem;
    outline: none;
    font-family: inherit;
    color: var(--black);
    background: white;
    cursor: pointer;
  }
  .count-badge {
    background: var(--teal);
    color: white;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 0.2rem 0.65rem;
    border-radius: 50px;
    white-space: nowrap;
  }

  /* LIST */
  .lecture-list { display: flex; flex-direction: column; max-height: 620px; overflow-y: auto; }
  .lecture-list::-webkit-scrollbar { width: 4px; }
  .lecture-list::-webkit-scrollbar-track { background: transparent; }
  .lecture-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .list-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    gap: 1rem;
    transition: background 0.15s;
  }
  .list-item:last-child { border-bottom: none; }
  .list-item:hover { background: var(--bg); }
  .list-item.editing { background: #FFFBEB; border-left: 3px solid #D69E2E; }

  .list-item-info { flex: 1; min-width: 0; }
  .list-item-date {
    font-size: 0.7rem;
    color: var(--taupe);
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 0.18rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .category-tag {
    background: var(--teal-pale);
    color: var(--teal);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.1rem 0.45rem;
    border-radius: 3px;
  }
  .list-item-title {
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--black);
    margin-bottom: 0.12rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .list-item-org { font-size: 0.78rem; color: var(--gray-light); }
  .list-item-note { font-size: 0.73rem; color: var(--taupe); margin-top: 0.25rem; font-style: italic; }
  .list-item-actions { display: flex; gap: 0.4rem; flex-shrink: 0; margin-top: 2px; }

  .edit-btn, .delete-btn {
    border: 1px solid var(--border);
    padding: 0.28rem 0.6rem;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.73rem;
    font-family: inherit;
    font-weight: 600;
    transition: all 0.15s;
    background: white;
  }
  .edit-btn { color: var(--teal); }
  .edit-btn:hover { background: var(--teal); color: white; border-color: var(--teal); }
  .delete-btn { color: var(--danger); border-color: #FCA5A5; }
  .delete-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }

  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--gray-light); font-size: 0.88rem; }
  .empty-state .e-icon { font-size: 2.5rem; margin-bottom: 0.6rem; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--black);
    color: white;
    padding: 0.78rem 1.4rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 9999;
    pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { background: var(--success); }
  #toast.error { background: var(--danger); }

  @media (max-width: 900px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .admin-body { grid-template-columns: 1fr; }
    .lecture-list { max-height: none; }
    .ce-grid { grid-template-columns: 1fr; }
    .ce-header { padding: 0.85rem 1.25rem; }
    .ce-body { padding: 1rem 1.25rem 1.25rem; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <img src="logo_mmc_2.png" alt="로고" onerror="this.style.display='none'">
      <span class="login-brand-top">Mind Moving</span>
      <span class="login-brand-sub">— Consulting —</span>
    </div>
    <h1>관리자 로그인</h1>
    <p>강의 이력을 관리합니다</p>
    <input type="password" id="pwInput" placeholder="비밀번호 입력"
      onkeydown="if(event.key==='Enter') login()">
    <button class="login-btn" onclick="login()">로그인</button>
    <div class="login-error" id="loginError">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="admin-header">
    <div class="admin-header-left">
      <img src="logo_mmc_2.png" alt="로고" onerror="this.style.display='none'">
      <div class="admin-header-brand">
        <strong>Mind Moving</strong>
        <span>관리자 페이지</span>
      </div>
    </div>
    <div class="admin-header-right">
      <a href="index.html" target="_blank" class="header-link">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M7 2H3a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1V9M10 2h4m0 0v4m0-4L7 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        홈페이지 보기
      </a>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </div>
  <div id="dbStatusBanner" style="display:none; padding:0.65rem 2rem; font-size:0.82rem; font-weight:600;"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon teal">📋</div>
      <div>
        <div class="stat-info-num" id="sTotal">0</div>
        <div class="stat-info-label">총 강의 수</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon teal">📅</div>
      <div>
        <div class="stat-info-num" id="sYear">0</div>
        <div class="stat-info-label">올해 강의</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon taupe">🏢</div>
      <div>
        <div class="stat-info-num" id="sOrg">0</div>
        <div class="stat-info-label">기관 / 기업 수</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon dark">📆</div>
      <div>
        <div class="stat-info-num" id="sRecent" style="font-size:1rem;">—</div>
        <div class="stat-info-label">최근 강의</div>
      </div>
    </div>
  </div>

  <!-- CONTENT EDITOR -->
  <div class="content-editor-wrap">
    <div class="ce-header" onclick="toggleCE()">
      <div class="ce-header-left">
        <strong>홈페이지 문구 편집</strong>
        <span>메인 문구, 강의 철학, 강사 소개, 연락처 등 모든 텍스트 수정</span>
      </div>
      <svg class="ce-arrow open" id="ceArrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="ce-body open" id="ceBody">
      <div class="ce-grid">
        <div class="ce-col">
          <div class="ce-section-label">상단 배너 &amp; 메인 화면</div>
          <div class="ce-field">
            <label>상단 배너 문구</label>
            <input type="text" id="ce_topBar" placeholder="Move your mind, move your life.">
          </div>
          <div class="ce-field">
            <label>메인 타이틀 1줄</label>
            <input type="text" id="ce_heroLine1" placeholder="마음이">
          </div>
          <div class="ce-field">
            <label>메인 타이틀 2줄</label>
            <input type="text" id="ce_heroLine2" placeholder="움직이면">
          </div>
          <div class="ce-field">
            <label>메인 타이틀 3줄 (강조색)</label>
            <input type="text" id="ce_heroLine3" placeholder="삶이 바뀐다">
          </div>
          <div class="ce-field">
            <label>메인 설명 문구 (줄바꿈: Enter)</label>

  async function hashPw(pw) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function previewPhoto(input) {
    const file = input.files[0];
    if (!file) return;
    document.getElementById('photoFileName').textContent = file.name;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('photoPreview').src = e.target.result;
      document.getElementById('photoPreviewWrap').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  function clearPhoto() {
    document.getElementById('fPhoto').value = '';
    document.getElementById('fPhotoUrl').value = '';
    document.getElementById('photoFileName').textContent = '선택된 파일 없음';
    document.getElementById('photoPreviewWrap').style.display = 'none';
    document.getElementById('photoPreview').src = '';
  }

  async function uploadPhoto(file) {
    const ext  = file.name.split('.').pop();
    const name = `${Date.now()}.${ext}`;
    const { data, error } = await sb.storage.from('lecture-photos').upload(name, file, { upsert: true });
    if (error) { console.error('Upload error:', error); return null; }
    const { data: urlData } = sb.storage.from('lecture-photos').getPublicUrl(name);
    return urlData.publicUrl;
  }

  function initDateSelects() {
    const yearSel = document.getElementById('fYear');
    const daySel  = document.getElementById('fDay');
    const curYear = new Date().getFullYear();
    for (let y = curYear + 1; y >= 2000; y--) {
      const opt = document.createElement('option');
      opt.value = y; opt.textContent = y + '년';
      yearSel.appendChild(opt);
    }
    for (let d = 1; d <= 31; d++) {
      const opt = document.createElement('option');
      opt.value = String(d).padStart(2, '0');
      opt.textContent = d + '일';
      daySel.appendChild(opt);
    }
  }

  async function login() {
    const hash = await hashPw(document.getElementById('pwInput').value);
    if (hash === PASSWORD_HASH) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      initDateSelects();
      loadContentFields();
      checkDbStatus();
      await loadCategoryOptions();
      await fetchLectures();
      initYearFilter();
      renderStats();
      renderList();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  }

  function logout() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('pwInput').value = '';
    document.getElementById('loginError').style.display = 'none';
    cancelEdit();
  }

  let lecturesCache = [];

  function getLectures() { return lecturesCache; }

  async function checkDbStatus() {
    const banner = document.getElementById('dbStatusBanner');
    banner.style.display = 'block';
    banner.style.background = '#FFF3CD';
    banner.style.color = '#856404';
    banner.textContent = '⏳ Supabase 연결 확인 중…';

    const { data, error } = await sb.from('lectures').select('id').limit(1);
    if (error) {
      banner.style.background = '#F8D7DA';
      banner.style.color = '#721C24';
      banner.innerHTML = `❌ Supabase 연결 실패 — <strong>${error.message}</strong><br>
        <small>→ Supabase SQL Editor에서 lectures 테이블 생성 후 새로고침 하세요.</small>`;
    } else {
      banner.style.background = '#D4EDDA';
      banner.style.color = '#155724';
      banner.textContent = `✅ Supabase 연결 정상 (lectures 테이블 확인됨, 현재 ${data.length >= 1 ? '데이터 있음' : '비어있음'})`;
      setTimeout(() => { banner.style.display = 'none'; }, 4000);
    }
  }

  async function loadCategoryOptions() {
    const { data } = await sb.from('lecture_areas')
      .select('title, category_key')
      .eq('active', true)
      .order('sort_order');
    const areas = (data || []).filter(a => a.category_key);
    const opts = areas.map(a => `<option value="${a.category_key}">${a.title}</option>`).join('');
    document.getElementById('fCategory').innerHTML      = '<option value="">선택 안 함</option>' + opts;
    document.getElementById('categoryFilter').innerHTML = '<option value="">전체 분야</option>' + opts;
  }

  async function fetchLectures() {
    const { data, error } = await sb.from('lectures').select('*').order('date', { ascending: false });
    if (error) {
      console.error('fetchLectures:', error);
      showToast('⚠️ Supabase 연결 오류: ' + error.message + '\n→ SQL Editor에서 lectures 테이블을 생성해주세요.', 'error');
      return;
    }
    lecturesCache = data || [];
  }

  function getContent() {
    try {
      const legacy = JSON.parse(localStorage.getItem('mindmoving_contact')) || {};
      const main   = JSON.parse(localStorage.getItem(CONTENT_KEY)) || {};
      return Object.assign({}, legacy, main);
    } catch { return {}; }
  }

  function loadContentFields() {
    const c = getContent();
    Object.keys(CONTENT_DEFAULTS).forEach(key => {
      const el = document.getElementById('ce_' + key);
      if (el) el.value = c[key] !== undefined ? c[key] : CONTENT_DEFAULTS[key];
    });
  }

  function saveContent() {
    const data = {};
    Object.keys(CONTENT_DEFAULTS).forEach(key => {
      const el = document.getElementById('ce_' + key);
      if (el) data[key] = el.value;
    });
    localStorage.setItem(CONTENT_KEY, JSON.stringify(data));
    showToast('✓ 문구가 저장되었습니다.', 'success');
  }

  function resetContent() {
    if (!confirm('모든 문구를 기본값으로 초기화하시겠습니까?')) return;
    localStorage.removeItem(CONTENT_KEY);
    localStorage.removeItem('mindmoving_contact');
    loadContentFields();
    showToast('기본값으로 초기화되었습니다.');
  }

  function toggleCE() {
    document.getElementById('ceBody').classList.toggle('open');
    document.getElementById('ceArrow').classList.toggle('open');
  }

  function renderStats() {
    const ls = getLectures();
    const year = new Date().getFullYear().toString();
    const orgs = new Set(ls.map(l => l.organization));
    const sorted = [...ls].sort((a, b) => b.date.localeCompare(a.date));
    document.getElementById('sTotal').textContent = ls.length;
    document.getElementById('sYear').textContent = ls.filter(l => l.date.startsWith(year)).length;
    document.getElementById('sOrg').textContent = orgs.size;
    document.getElementById('sRecent').textContent = sorted.length ? sorted[0].date : '—';
  }

  function initYearFilter() {
    const years = [...new Set(getLectures().map(l => l.date.slice(0, 4)))].sort((a, b) => b - a);
    const sel = document.getElementById('yearFilter');
    sel.innerHTML = '<option value="">전체 연도</option>' +
      years.map(y => `<option value="${y}">${y}년</option>`).join('');
  }

  function getDateValue() {
    const y = document.getElementById('fYear').value;
    const m = document.getElementById('fMonth').value;
    const d = document.getElementById('fDay').value;
    if (!y || !m) return '';
    return d ? `${y}-${m}-${d}` : `${y}-${m}`;
  }

  function formatDateDisplay(date) {
    if (!date) return '';
    const parts = date.split('-');
    if (parts.length === 3) return `${parts[0]}년 ${parseInt(parts[1])}월 ${parseInt(parts[2])}일`;
    if (parts.length === 2) return `${parts[0]}년 ${parseInt(parts[1])}월`;
    return date;
  }

  function populateDateFields(date) {
    if (!date) return;
    const parts = date.split('-');
    document.getElementById('fYear').value  = parts[0] || '';
    document.getElementById('fMonth').value = parts[1] || '';
    document.getElementById('fDay').value   = parts[2] || '';
  }

  async function submitForm() {
    const title = document.getElementById('fTitle').value.trim();
    const org   = document.getElementById('fOrg').value.trim();
    const date  = getDateValue();
    const cat   = document.getElementById('fCategory').value;
    const note  = document.getElementById('fNote').value.trim();
    if (!title || !org || !date) { showToast('⚠️ 강의명, 기관명, 날짜는 필수입니다.', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '저장 중…';

    let photoUrl = document.getElementById('fPhotoUrl').value || '';
    const photoFile = document.getElementById('fPhoto').files[0];
    if (photoFile) {
      showToast('📤 사진 업로드 중…');
      const url = await uploadPhoto(photoFile);
      if (url) photoUrl = url;
      else showToast('⚠️ 사진 업로드 실패 (텍스트 내용은 저장됩니다)', 'error');
    }

    if (editingId) {
      const { error } = await sb.from('lectures').update(
        { title, organization: org, date, category: cat, note, photo_url: photoUrl }
      ).eq('id', editingId);
      if (error) { showToast('⚠️ 저장 실패: ' + error.message, 'error'); }
      else { showToast('✓ 수정되었습니다.', 'success'); cancelEdit(); }
    } else {
      const { error } = await sb.from('lectures').insert(
        { id: Date.now().toString(), title, organization: org, date, category: cat, note, photo_url: photoUrl }
      );
      if (error) { showToast('⚠️ 저장 실패: ' + error.message, 'error'); }
      else { showToast('✓ 추가되었습니다.', 'success'); clearForm(); }
    }
    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> 추가하기';
    await fetchLectures();
    initYearFilter();
    renderStats();
    renderList();
  }

  function clearForm() {
    ['fTitle','fOrg','fYear','fMonth','fDay','fNote'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fCategory').value = '';
    clearPhoto();
  }

  function startEdit(id) {
    const l = getLectures().find(l => l.id === id);
    if (!l) return;
    editingId = id;
    document.getElementById('fTitle').value    = l.title;
    document.getElementById('fOrg').value      = l.organization;
    populateDateFields(l.date);
    document.getElementById('fCategory').value = l.category || '';
    document.getElementById('fNote').value     = l.note || '';
    if (l.photo_url) {
      document.getElementById('fPhotoUrl').value = l.photo_url;
      document.getElementById('photoPreview').src = l.photo_url;
      document.getElementById('photoPreviewWrap').style.display = 'block';
      document.getElementById('photoFileName').textContent = '기존 사진';
    }
    document.getElementById('formTitle').textContent = '강의 이력 수정';
    document.getElementById('submitBtn').innerHTML = '수정 저장';
    document.getElementById('submitBtn').classList.add('edit-mode');
    document.getElementById('cancelEditBtn').style.display = 'block';
    renderList();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editingId = null;
    clearForm();
    document.getElementById('formTitle').textContent = '강의 이력 추가';
    document.getElementById('submitBtn').innerHTML =
      '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> 추가하기';
    document.getElementById('submitBtn').classList.remove('edit-mode');
    document.getElementById('cancelEditBtn').style.display = 'none';
    renderList();
  }

  async function deleteLecture(id) {
    if (!confirm('이 강의 이력을 삭제하시겠습니까?')) return;
    if (editingId === id) cancelEdit();
    const { error } = await sb.from('lectures').delete().eq('id', id);
    if (error) { showToast('⚠️ 삭제 실패: ' + error.message, 'error'); return; }
    await fetchLectures();
    initYearFilter();
    renderStats();
    renderList();
    showToast('삭제되었습니다.');
  }

  function renderList() {
    const search = document.getElementById('searchInput').value.trim().toLowerCase();
    const yearF  = document.getElementById('yearFilter').value;
    const catF   = document.getElementById('categoryFilter').value;
    let ls = getLectures().sort((a, b) => b.date.localeCompare(a.date));
    if (search) ls = ls.filter(l =>
      l.title.toLowerCase().includes(search) || l.organization.toLowerCase().includes(search));
    if (yearF) ls = ls.filter(l => l.date.startsWith(yearF));
    if (catF)  ls = ls.filter(l => (l.category || '') === catF);
    document.getElementById('countBadge').textContent = ls.length;
    const list = document.getElementById('lectureList');
    if (ls.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="e-icon">📋</div>등록된 강의 이력이 없습니다.</div>`;
      return;
    }
    list.innerHTML = ls.map(l => `
      <div class="list-item${editingId === l.id ? ' editing' : ''}">
        <div class="list-item-info">
          <div class="list-item-date">
            ${formatDateDisplay(l.date)}
            ${l.category ? `<span class="category-tag">${esc(l.category)}</span>` : ''}
          </div>
          <div class="list-item-title" title="${esc(l.title)}">${esc(l.title)}</div>
          <div class="list-item-org">${esc(l.organization)}</div>
          ${l.note ? `<div class="list-item-note">${esc(l.note)}</div>` : ''}
        </div>
        <div class="list-item-actions">
          <button class="edit-btn" onclick="startEdit('${l.id}')">수정</button>
          <button class="delete-btn" onclick="deleteLecture('${l.id}')">삭제</button>
        </div>
      </div>
    `).join('');
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = type ? `show ${type}` : 'show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = '', 2800);
  }
</script>
</body>
</html>
